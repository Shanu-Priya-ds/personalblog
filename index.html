<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Blog</title>
    <link rel="stylesheet" href="./style/styles.css" />
    <script defer src="./script/blog.js"></script>
</head>

<body>
    <h1>Personal Blog</h1>
    <section id="form-container">
        <h2>New Post</h2>
        <form id="newBlogForm">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" name="title" id="title" placeholder="Enter Blog Title" required />
                <span class=error-message id="titleErrorMessage"></span>
            </div>
            <div class="form-group">
                <label for="content">Content</label>
                <textarea name="content" id="content" placeholder="Start writing your content.." required rows="10"
                    cols="50"></textarea>
                <span class="error-message" id="contentErrorMessage"></span>
            </div>
            <button type="submit">Create</button>
        </form>
    </section>
    <section id="list-blog-container">
        <h3>Your Blog List</h3>
    </section>
    <dialog id="editDialog">
        <h2>Edit Post</h2>
        <form id="editBlogForm">
            <button type="button" id="closeDialog">close</button>
            <div class="form-group">
                <label for="edit-title">Title</label>
                <input type="text" name="title" id="edit-title" placeholder="Enter Blog Title" required />
                <span class=error-message id="edittitleErrorMessage"></span>
            </div>
            <div class="form-group">
                <label for="edit-content">Content</label>
                <textarea autofocus name="content" id="edit-content" placeholder="Start writing your content.." required rows="10"
                    cols="50"></textarea>
                <span class="error-message" id="editcontentErrorMessage"></span>
            </div>
            <button type="submit">update</button>
             <input type="hidden" id="blogId">
        </form>
    </dialog>
</body>

</html>
